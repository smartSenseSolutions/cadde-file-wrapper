apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cadde-file-wrapper.fullname" . }}
  labels:
    {{- include "cadde-file-wrapper.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "cadde-file-wrapper.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cadde-file-wrapper.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.wireguard.enabled }}
      initContainers:
        - name: wireguard-init
          image: linuxserver/wireguard:latest
          command:
            - sh
            - -c
            - |
              wg-quick up wg0
              # Wait until the WireGuard interface is up and can reach the VPN network
              for i in $(seq 1 30); do
                if wg show wg0 2>/dev/null | grep -q "latest handshake"; then
                  echo "WireGuard tunnel established"
                  exit 0
                fi
                echo "Waiting for WireGuard handshake... ($i/30)"
                sleep 2
              done
              echo "WireGuard handshake not detected, proceeding anyway"
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
            privileged: true
          volumeMounts:
            - name: wireguard-config
              mountPath: /etc/wireguard/wg0.conf
              subPath: wg0.conf
              readOnly: true
      {{- end }}
      containers:
        {{- if .Values.wireguard.enabled }}
        - name: wireguard
          image: linuxserver/wireguard:latest
          command:
            - sh
            - -c
            - |
              wg-quick up wg0
              sleep infinity
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
            privileged: true
          volumeMounts:
            - name: wireguard-config
              mountPath: /etc/wireguard/wg0.conf
              subPath: wg0.conf
              readOnly: true
        {{- end }}
        - name: cadde-file-wrapper
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: {{ include "cadde-file-wrapper.fullname" . }}
            - secretRef:
                name: {{ include "cadde-file-wrapper.fullname" . }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
      {{- if .Values.wireguard.enabled }}
      volumes:
        - name: wireguard-config
          secret:
            secretName: {{ include "cadde-file-wrapper.fullname" . }}-wireguard
      {{- end }}

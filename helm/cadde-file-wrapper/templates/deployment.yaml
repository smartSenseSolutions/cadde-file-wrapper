apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cadde-file-wrapper.fullname" . }}
  labels:
    {{- include "cadde-file-wrapper.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "cadde-file-wrapper.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cadde-file-wrapper.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.wireguard.enabled }}
      initContainers:
        - name: wireguard-init
          image: linuxserver/wireguard:latest
          command:
            - bash
            - -c
            - |
              set -e
              echo "Setting up WireGuard tunnel..."
              # Use raw commands so the interface is NOT torn down on exit
              ip link add dev wg0 type wireguard
              wg setconf wg0 <(grep -v "^Address\|^DNS\|^MTU" /etc/wireguard/wg0.conf)
              ip -4 address add 10.250.254.212/32 dev wg0
              ip link set mtu 1450 up dev wg0
              # Add route for the VPN network
              ip route add 10.250.0.0/16 dev wg0
              echo "WireGuard interface is up, waiting for handshake..."
              for i in $(seq 1 30); do
                HANDSHAKE=$(wg show wg0 latest-handshakes 2>/dev/null | awk '{print $2}')
                if [ -n "$HANDSHAKE" ] && [ "$HANDSHAKE" != "0" ]; then
                  echo "WireGuard tunnel established! Handshake at: $HANDSHAKE"
                  wg show wg0
                  exit 0
                fi
                echo "Waiting for WireGuard handshake... ($i/30)"
                sleep 2
              done
              echo "WARNING: No handshake after 60s. Current state:"
              wg show wg0
              ip route show dev wg0
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
            privileged: true
          volumeMounts:
            - name: wireguard-config
              mountPath: /etc/wireguard/wg0.conf
              subPath: wg0.conf
              readOnly: true
      {{- end }}
      containers:
        {{- if .Values.wireguard.enabled }}
        - name: wireguard
          image: linuxserver/wireguard:latest
          command:
            - bash
            - -c
            - |
              echo "WireGuard sidecar monitoring tunnel..."
              # The init container already set up the interface.
              # This sidecar keeps the pod alive and re-creates the tunnel if it drops.
              while true; do
                if ! wg show wg0 > /dev/null 2>&1; then
                  echo "WireGuard interface down, recreating..."
                  ip link add dev wg0 type wireguard 2>/dev/null || true
                  wg setconf wg0 <(grep -v "^Address\|^DNS\|^MTU" /etc/wireguard/wg0.conf)
                  ip -4 address add 10.250.254.212/32 dev wg0 2>/dev/null || true
                  ip link set mtu 1450 up dev wg0
                  ip route add 10.250.0.0/16 dev wg0 2>/dev/null || true
                fi
                sleep 30
              done
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
            privileged: true
          volumeMounts:
            - name: wireguard-config
              mountPath: /etc/wireguard/wg0.conf
              subPath: wg0.conf
              readOnly: true
        {{- end }}
        - name: cadde-file-wrapper
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: {{ include "cadde-file-wrapper.fullname" . }}
            - secretRef:
                name: {{ include "cadde-file-wrapper.fullname" . }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
      {{- if .Values.wireguard.enabled }}
      volumes:
        - name: wireguard-config
          secret:
            secretName: {{ include "cadde-file-wrapper.fullname" . }}-wireguard
      {{- end }}

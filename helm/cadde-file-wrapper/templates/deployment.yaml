apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cadde-file-wrapper.fullname" . }}
  labels:
    {{- include "cadde-file-wrapper.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "cadde-file-wrapper.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cadde-file-wrapper.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: cadde-file-wrapper
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: {{ include "cadde-file-wrapper.fullname" . }}
            - secretRef:
                name: {{ include "cadde-file-wrapper.fullname" . }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 30

{{- if .Values.wireguard.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cadde-file-wrapper.fullname" . }}-wireguard
  labels:
    {{- include "cadde-file-wrapper.labels" . | nindent 4 }}
type: Opaque
stringData:
  wg0.conf: |
    {{- .Values.wireguard.config | nindent 4 }}
{{- end }}

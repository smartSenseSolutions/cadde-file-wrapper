replicaCount: 1

image:
  repository: public.ecr.aws/smartsensesolutions/eu-jap-hack/cadde-file-wrapper
  tag: "0.0.1"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  name: http
  port: 8000

cadde:
  tokenUrl: "https://cadde-authn.koshizukalab.dataspace.internal:18443/cadde/api/v4/token"
  fileUrl: "https://cadde-consumer-0001.hackathon.dataspace.internal:1443/cadde/api/v4/file"
  resourceBaseUrl: "http://data-management.koshizukalab.internal:8080"
  resourceApiType: "file/http"
  provider: "0003-koshizukalab"
  userId: "0001-hackathon"

ingress:
  enabled: true
  className: ""
  host: "cadde-wrapper.127.0.0.1.nip.io"
  annotations:
    traefik.ingress.kubernetes.io/router.tls: "true"
  tls:
    enabled: false
    secretName: "cadde-file-wrapper-tls"

certManager:
  enabled: false
  issuerName: "letsencrypt-prod"
  # issuerKind: ClusterIssuer (default) or Issuer
  issuerKind: "ClusterIssuer"

haproxy:
  enabled: false
  # Timeout in milliseconds
  timeoutConnect: "5000"
  timeoutClient: "50000"
  timeoutServer: "50000"
  # Rate limiting: max requests per period per IP
  rateLimitRequests: ""
  rateLimitPeriod: ""
  # Extra HAProxy annotations (key: value)
  annotations: {}

wireguard:
  enabled: true
  # Paste your full wg0.conf content here (or override via --set-file)
  config: |
    [Interface]
    Address = 10.250.254.212/32
    PrivateKey = kEOWR9Yjm8d2u6EmtUFK363IBZWuWnZLluuqrwXcXH4=
    DNS = 10.250.1.2,8.8.8.8
    MTU = 1450

    [Peer]
    PublicKey = Zxt2B5DJhc3T1DHDvD0zMGT+MT01HUan4XNo7IE2KSQ=
    PresharedKey = X8fKZ/KnhpriMMBTj8BMtqIHd15nUbmQa2ft6IpA5jA=
    AllowedIPs = 10.250.0.0/16
    Endpoint = 52.68.212.182:51820
    PersistentKeepalive = 60

# Sensitive values — override via --set or a secret values file
secret:
  authBasic: "Basic d2ViYXBwLTAwMDEtaGFja2F0aG9uOjY3UmFKNFNYYUc5WmswNkJNbklOakZJbGdOZjlFUzZP"
  password: "0001-hackathon"
